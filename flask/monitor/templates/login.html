{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:440px; padding-top:110px; padding-bottom:60px;">
  <div class="tool-panel">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill" style="font-size:2.5rem; color:var(--accent);"></i>
      <h4 class="mt-2 fw-bold">로그인</h4>
      <p class="text-dim small mb-0">ForensicLab에 오신 것을 환영합니다</p>
    </div>
    {% if error %}
    <div class="alert-error mb-3"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label-sm">아이디</label>
        <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label-sm">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn btn-accent w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>로그인
      </button>
    </form>
    <hr style="border-color:var(--border);" class="my-4">
    <p class="text-center text-dim small mb-0">
      계정이 없으신가요? <a href="/signup" class="text-accent">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
