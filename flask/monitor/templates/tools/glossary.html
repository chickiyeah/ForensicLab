{% extends 'base.html' %}{% block content %}
<div class="page-hero"><div class="container">
<h1 class="page-title"><i class="bi bi-book-fill me-2 text-accent"></i>포렌식 용어집</h1>
<p class="page-sub">디지털 포렌식에서 자주 쓰는 용어 {{ glossary|length }}개 — 처음 보는 단어 빠르게 검색.</p>
</div></div>

<div class="container pb-5">
<div class="tool-panel mb-3" style="position:sticky; top:60px; z-index:10; background:var(--bg-card);">
<div class="position-relative">
<i class="bi bi-search position-absolute" style="left:.8rem; top:50%; transform:translateY(-50%); color:var(--text-dim);"></i>
<input type="text" id="gSearch" class="form-control" placeholder="용어 검색 (예: MFT, ATT&CK, RID)" style="padding-left:2.3rem;" autofocus>
</div>
</div>

<div class="row g-2" id="gList">
{% for term, desc in glossary %}
<div class="col-md-6 g-item" data-text="{{ term|lower }} {{ desc|lower }}">
<div class="tool-panel h-100" style="padding:.7rem 1rem;">
<strong style="color:var(--accent); font-size:1rem;">{{ term }}</strong>
<div class="text-dim mt-1" style="font-size:.86rem; line-height:1.5;">{{ desc }}</div>
</div></div>
{% endfor %}
</div>
</div>

<script>
document.getElementById('gSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.g-item').forEach(el => {
    el.style.display = (!q || el.dataset.text.includes(q)) ? '' : 'none';
  });
});
</script>
{% endblock %}
